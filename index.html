<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>阿瓦隆战绩 · 11人同步版</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#1A0F2A; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color:#FFF; padding:20px; max-width:800px; margin:auto; }
    h1,h2 { color:#FFD700; margin-bottom:0.5em; }
    .card { background: rgba(26,15,42,0.8); border:1px solid #7B5BA8; border-radius:12px; padding:20px; margin-bottom:20px; }
    select,input,button { background:#1F1535; color:#FFF; border:1px solid #7B5BA8; border-radius:8px; padding:8px 12px; margin:4px 0; font-size:14px; width:100%; }
    button { background:#7B5BA8; font-weight:bold; cursor:pointer; border:none; width:auto; display:inline-block; margin-right:8px; }
    button:hover { background:#FFD700; color:#1A0F2A; }
    .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap:20px; }
    .player-chip { display:inline-block; background:#2a1f3a; border:1px solid #5A4BFF; border-radius:20px; padding:6px 12px; margin:4px; cursor:pointer; }
    .player-chip.active { background:#FFD700; color:#1A0F2A; border-color:#FFD700; }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    th,td { padding:10px 8px; border-bottom:1px solid #5A4BFF; text-align:center; }
    th { color:#FFD700; }
    .role-selector { display:flex; align-items:center; justify-content:space-between; margin:6px 0; }
    .role-selector label { flex:1; margin-right:10px; }
    .role-selector select { flex:2; }
    .loading { color:#FFD700; text-align:center; padding:20px; }
    @media (max-width:768px) { .grid-2col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>⚔️ 阿瓦隆 · 11人同步战绩</h1>
  <div id="status" class="loading">⏳ 正在连接飞书云端数据...</div>

  <!-- 玩家管理 -->
  <div class="card">
    <h2>👥 玩家管理</h2>
    <p style="color:#B8A9C9; margin-bottom:8px;">点击名字标记为"常玩成员"（各人手机独立设置）</p>
    <div id="playerList"></div>
  </div>

  <!-- 新增对局 -->
  <div class="card">
    <h2>📝 记录新对局</h2>
    <div class="grid-2col">
      <div>
        <label>日期：</label>
        <input type="date" id="gameDate" />
      </div>
      <div>
        <label>获胜阵营：</label>
        <select id="winnerTeam">
          <option value="好人">好人阵营 (蓝方)</option>
          <option value="坏人">坏人阵营 (红方)</option>
        </select>
      </div>
    </div>
    <p style="margin-top:10px;"><strong>每位队员的身份：</strong></p>
    <div id="roleAssignment"></div>
    <button id="addGameBtn">✅ 记录这局（同步到云端）</button>
    <button id="refreshBtn">🔄 手动刷新</button>
    <span style="margin-left:12px; font-size:12px; color:#6B5B8C;">共 <span id="totalGames">0</span> 场</span>
  </div>

  <!-- 战力排行 & 个人详情 -->
  <div class="grid-2col">
    <div class="card">
      <h2>🏆 战力排行榜</h2>
      <table>
        <thead><tr><th>排名</th><th>玩家</th><th>场次</th><th>胜率</th><th>战力值</th></tr></thead>
        <tbody id="rankBody"></tbody>
      </table>
    </div>
    <div class="card">
      <h2>📊 个人统计详情</h2>
      <select id="playerSelect" style="width:100%; margin-bottom:10px;">
        <option value="">-- 选择玩家 --</option>
      </select>
      <div id="playerDetail"></div>
    </div>
  </div>

  <!-- 最近对局 -->
  <div class="card">
    <h2>📋 最近10局记录（云端数据）</h2>
    <div id="gameHistory" style="max-height:300px; overflow-y:auto;"></div>
  </div>

  <script>
    // ========== 🔧 飞书配置 ==========
    const FEISHU = {
      baseId: 'KUFywjulLiHK0ckJuHDcM2hynko',
      tableId: 'tblI5guGXQAkzcNj',
      token: 'pt-e-ny4SxNCio9i8Flr3ZnuRMdZldfptB7ZuYR8GmdAQAABIBAVNXLQwRQR9jR'
    };

    // ========== 👥 11位玩家 ==========
    const defaultPlayers = [
      "蒋楚", "毛欢", "仇俊", "邓亮", "刘思源", "刘俊",
      "焦嘉勇", "沈钰莹", "胡辉祥", "蔺雨欣", "包沁禾"
    ];

    // ========== 🎭 角色定义 (名称: 阵营) ==========
    const ROLE_MAP = {
      '梅林': '好人',
      '派西维尔': '好人',
      '平民': '好人',
      '莫甘娜': '坏人',
      '刺客': '坏人',
      '奥伯伦': '坏人',
      '莫德雷德': '坏人',
      '兰斯洛特': '坏人'   // 默认算坏人，可按需调整
    };
    const GOOD_ROLES = Object.keys(ROLE_MAP).filter(r => ROLE_MAP[r] === '好人');
    const BAD_ROLES = Object.keys(ROLE_MAP).filter(r => ROLE_MAP[r] === '坏人');

    // ========== 玩家数据 ==========
    let players = JSON.parse(localStorage.getItem('avalon_players')) ||
      defaultPlayers.map((name, idx) => ({ id: idx, name, regular: true }));
    // 修正可能的名字变更
    if (players.length === defaultPlayers.length) {
      players.forEach((p, idx) => p.name = defaultPlayers[idx]);
    } else {
      players = defaultPlayers.map((name, idx) => ({ id: idx, name, regular: true }));
    }

    let games = [];

    // ---------- 本地存储 ----------
    function savePlayers() { localStorage.setItem('avalon_players', JSON.stringify(players)); }

    function getPlayer(id) { return players.find(p => p.id === id); }

    // ---------- UI 渲染 ----------
    function renderPlayerList() {
      document.getElementById('playerList').innerHTML = players.map(p => `
        <span class="player-chip ${p.regular ? 'active' : ''}" onclick="togglePlayer(${p.id})">
          ${p.name} ${p.regular ? '✓' : ''}
        </span>
      `).join('');
      updateRoleAssignments();
      renderPlayerSelect();
    }

    function togglePlayer(id) {
      const p = players.find(p => p.id === id);
      if (p) p.regular = !p.regular;
      savePlayers();
      renderPlayerList();
      renderAllStats();
    }

    function updateRoleAssignments() {
      const actives = players.filter(p => p.regular);
      const container = document.getElementById('roleAssignment');
      container.innerHTML = actives.map(p => `
        <div class="role-selector">
          <label>${p.name}</label>
          <select id="role_${p.id}">
            <option value="">-- 选择身份 --</option>
            ${GOOD_ROLES.map(r => `<option value="${r}">${r}</option>`).join('')}
            ${BAD_ROLES.map(r => `<option value="${r}">${r}</option>`).join('')}
          </select>
        </div>
      `).join('');
    }

    function renderPlayerSelect() {
      const sel = document.getElementById('playerSelect');
      const actives = players.filter(p => p.regular);
      sel.innerHTML = '<option value="">-- 选择玩家 --</option>' + 
        actives.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    }

    // ---------- 飞书 API ----------
    async function fetchGames() {
      document.getElementById('status').innerText = '🔄 正在从飞书拉取对局记录...';
      let allRecords = [];
      let pageToken = null;
      try {
        do {
          let url = `https://open.feishu.cn/open-apis/bitable/v1/apps/${FEISHU.baseId}/tables/${FEISHU.tableId}/records?page_size=200`;
          if (pageToken) url += `&page_token=${pageToken}`;
          const res = await fetch(url, {
            headers: {
              'Authorization': `Bearer ${FEISHU.token}`,
              'Content-Type': 'application/json'
            }
          });
          const data = await res.json();
          if (data.code !== 0) throw new Error(data.msg);
          allRecords = allRecords.concat(data.data.items || []);
          pageToken = data.data.has_more ? data.data.page_token : null;
        } while (pageToken);

        games = allRecords.map(rec => {
          const f = rec.fields;
          let roles = {};
          if (f['角色分配']) {
            try { roles = JSON.parse(f['角色分配']); } catch(e) { roles = {}; }
          }
          return {
            id: rec.record_id,
            date: f['日期'] || '',
            winner: f['获胜阵营'] || '',
            players: Array.isArray(f['参与玩家']) ? f['参与玩家'] : [],
            roles
          };
        });
        document.getElementById('status').innerText = `✅ 已同步 ${games.length} 场对局`;
      } catch (err) {
        document.getElementById('status').innerText = '❌ 加载失败，请检查Token或网络';
        console.error(err);
      }
      renderAllStats();
    }

    async function addGameToFeishu(gameData) {
      const body = {
        fields: {
          '日期': gameData.date,
          '获胜阵营': gameData.winner,
          '参与玩家': gameData.players,
          '角色分配': JSON.stringify(gameData.roles)
        }
      };
      try {
        const res = await fetch(`https://open.feishu.cn/open-apis/bitable/v1/apps/${FEISHU.baseId}/tables/${FEISHU.tableId}/records`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${FEISHU.token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.code !== 0) throw new Error(data.msg);
        return true;
      } catch (err) {
        alert('上传到飞书失败：' + err.message);
        return false;
      }
    }

    // ---------- 战力计算 (ELO，使用真实阵营) ----------
    function calculateELO() {
      const eloMap = {};
      players.forEach(p => eloMap[p.id] = 1000);
      const sorted = [...games].sort((a,b) => (a.date||'').localeCompare(b.date||''));
      sorted.forEach(game => {
        if (!game.roles || Object.keys(game.roles).length === 0) return;
        const participantIds = [];
        const blueIds = [];
        const redIds = [];
        for (let name in game.roles) {
          const player = players.find(p => p.name === name);
          if (!player) continue;
          const role = game.roles[name];
          const faction = ROLE_MAP[role] || (role === '好人' ? '好人' : '坏人'); // 后备
          participantIds.push(player.id);
          if (faction === '好人') blueIds.push(player.id);
          else redIds.push(player.id);
        }
        if (blueIds.length === 0 || redIds.length === 0) return;
        const avgBlue = blueIds.reduce((s,id) => s + (eloMap[id]||1000), 0) / blueIds.length;
        const avgRed = redIds.reduce((s,id) => s + (eloMap[id]||1000), 0) / redIds.length;
        const expectedBlue = 1 / (1 + Math.pow(10, (avgRed - avgBlue) / 400));
        const K = 16;
        const scoreChange = game.winner === '好人' ? K * (1 - expectedBlue) : K * (0 - expectedBlue);
        blueIds.forEach(id => eloMap[id] = (eloMap[id]||1000) + scoreChange);
        redIds.forEach(id => eloMap[id] = (eloMap[id]||1000) - scoreChange);
      });
      return eloMap;
    }

    function getPlayerStats(playerName) {
      const myGames = games.filter(g => g.players.includes(playerName));
      if (myGames.length === 0) return { total:0, wins:0, goodGames:0, badGames:0, goodWins:0, badWins:0 };
      let wins = 0, goodGames = 0, badGames = 0, goodWins = 0, badWins = 0;
      myGames.forEach(g => {
        const role = g.roles[playerName];
        if (!role) return; // 无角色数据则跳过
        const faction = ROLE_MAP[role];
        if (!faction) return;
        const isWin = (g.winner === faction);
        if (isWin) wins++;
        if (faction === '好人') {
          goodGames++;
          if (isWin) goodWins++;
        } else {
          badGames++;
          if (isWin) badWins++;
        }
      });
      const total = myGames.filter(g => g.roles[playerName] !== undefined).length; // 有效对局数
      return { total, wins, goodGames, badGames, goodWins, badWins };
    }

    // ---------- 渲染统计 ----------
    function renderAllStats() {
      const eloMap = calculateELO();
      const activePlayers = players.filter(p => p.regular);
      const ranked = [...activePlayers].sort((a,b) => (eloMap[b.id]||1000) - (eloMap[a.id]||1000));
      document.getElementById('rankBody').innerHTML = ranked.map((p, idx) => {
        const st = getPlayerStats(p.name);
        const winRate = st.total ? (st.wins / st.total * 100).toFixed(1) : '0.0';
        return `<tr>
          <td style="color:#FFD700;">#${idx+1}</td>
          <td>${p.name}</td>
          <td>${st.total}</td>
          <td>${winRate}%</td>
          <td>${Math.round(eloMap[p.id])}</td>
        </tr>`;
      }).join('') || '<tr><td colspan="5">暂无有效对局</td></tr>';

      // 最近对局
      const recent = [...games].filter(g => Object.keys(g.roles).length > 0).slice(-10).reverse();
      document.getElementById('gameHistory').innerHTML = recent.map(g => {
        const rolesStr = Object.entries(g.roles).map(([name, role]) => `${name}(${role})`).join(' ');
        return `<div style="margin-bottom:6px; padding:6px; background:#1F1535; border-radius:8px;">
          <strong>${g.date}</strong> | ${g.winner==='好人'?'🔵好人胜':'🔴坏人胜'}<br>
          <small>${rolesStr}</small>
        </div>`;
      }).join('') || '<p style="color:#6B5B8C;">暂无有效对局（请添加包含角色数据的对局）</p>';

      document.getElementById('totalGames').innerText = games.length;
      renderPlayerSelect();
    }

    // 个人详情
    document.getElementById('playerSelect').addEventListener('change', (e) => {
      const id = parseInt(e.target.value);
      if (isNaN(id)) { document.getElementById('playerDetail').innerHTML = ''; return; }
      const p = getPlayer(id);
      if (!p) return;
      const st = getPlayerStats(p.name);
      const eloMap = calculateELO();
      const total = st.total;
      const wins = st.wins;
      const goodRate = st.goodGames ? (st.goodWins / st.goodGames * 100).toFixed(1) : '0.0';
      const badRate = st.badGames ? (st.badWins / st.badGames * 100).toFixed(1) : '0.0';
      const wolfProb = total ? (st.badGames / total * 100).toFixed(1) : '0.0';
      document.getElementById('playerDetail').innerHTML = `
        <h3 style="color:#FFD700;">${p.name}</h3>
        <p>📅 总场次(有效): <strong>${total}</strong></p>
        <p>🏆 综合胜率: <strong>${total ? (wins/total*100).toFixed(1) : '0.0'}%</strong></p>
        <p>🛡️ 好人胜率: <strong>${goodRate}%</strong> (${st.goodGames}局)</p>
        <p>🗡️ 坏人胜率: <strong>${badRate}%</strong> (${st.badGames}局)</p>
        <p>🐺 摸狼概率: <strong>${wolfProb}%</strong></p>
        <p>⚡ 战力值: <strong>${Math.round(eloMap[id])}</strong></p>
        <p style="font-size:12px; color:#6B5B8C;">* 需要每局填写身份才精确</p>
      `;
    });

    // 记录对局
    document.getElementById('addGameBtn').addEventListener('click', async () => {
      const actives = players.filter(p => p.regular);
      if (actives.length < 5) { alert('至少需要5名活跃玩家'); return; }
      const winner = document.getElementById('winnerTeam').value;
      const date = document.getElementById('gameDate').value || new Date().toISOString().split('T')[0];
      const roles = {};
      let allFilled = true;
      actives.forEach(p => {
        const sel = document.getElementById(`role_${p.id}`);
        if (!sel || !sel.value) { allFilled = false; return; }
        roles[p.name] = sel.value;
      });
      if (!allFilled) { alert('请为所有活跃玩家选择身份'); return; }
      const playerNames = actives.map(p => p.name);
      const success = await addGameToFeishu({ date, winner, players: playerNames, roles });
      if (success) {
        // 重置角色选择
        actives.forEach(p => {
          const sel = document.getElementById(`role_${p.id}`);
          if (sel) sel.value = '';
        });
        await fetchGames();
      }
    });

    document.getElementById('refreshBtn').addEventListener('click', fetchGames);

    // 初始化
    document.getElementById('gameDate').valueAsDate = new Date();
    renderPlayerList();
    fetchGames();
  </script>
</body>
</html>
